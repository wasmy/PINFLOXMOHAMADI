# Account
account:
  created_date: "2026-04-24" # Date the Pinterest account was created (for warming schedule)

# Browser
browser:
  session_file: "data/pinterest_session.json" # Playwright session (auto-managed)
  chrome_profile_path: "" # Optional: Path to custom Chrome profile (leave empty to use .env credentials)
  headless: false # false = headful (recommended for debugging)

# Niche Configuration
niche:
  seed_keywords:
    # Sports Mom SVGs - biggest niche on Pinterest
    - "Gymnastics Mom SVG shirt design"
    - "Sports Mom PNG Cricut design"
    - "Cheer Mom SVG digital download"
    - "Dance Mom shirt SVG"
    - "Funny Gymnastics Mom gift ideas"
    - "Gym Mom Cricut cut file"
    # ADHD Planners & Apps - trending niche
    - "ADHD planner digital download"
    - "ADHD brain dump template"
    - "ADHD organization tools"
    - "Second brain Notion template ADHD"
    - "ADHD cleaning planner printable"
    # Digital Planners & Apps
    - "digital planner Etsy download"
    - "offline planner HTML app"
    - "teacher planner digital app"
    - "family command center printable"
    - "budget tracker digital download"
    # Kids Printables
    - "kids chore chart printable safari"
    - "potty training reward chart toddler"
    # Gymnastics Party & Gifts
    - "gymnastics birthday party printable"
    - "gymnastics planner goal tracker"
  categories:
    - "DIY and Crafts"
    - "Women's Fashion"
    - "Education"
    - "Kids & Parenting"
    - "Health"
    - "Organization"

# Posting Schedule
schedule:
  start_hour: 8 # Hour to run daily cycle (24h format)
  timezone: "US/Eastern"
  peak_hours: [10, 14, 18, 20] # Hours in 24h format
  interval_min_minutes: 15 # Minimum gap between posts
  interval_max_minutes: 45 # Maximum gap between posts

# Posting Destination Link
posting:
  destination_link_mode: "both" # none | description_only | destination_link | both
  default_destination_link: "https://www.etsy.com/shop/SmartStitchCo" # Etsy Store
  # Maps keyword patterns to your real Pinterest board names
  # Bot will use these instead of AI-generated board names
  default_board: "Digital Planners"  # Fallback board for unmatched keywords
  board_map:
    "gymnastics": "Sports Mom Bundles"
    "sports mom": "Sports Mom Bundles"
    "cheer mom": "Sports Mom Bundles"
    "dance mom": "Sports Mom Bundles"
    "gym mom": "Sports Mom Bundles"
    "svg": "SVG Crafts"
    "cricut": "SVG Crafts"
    "png": "SVG Crafts"
    "cut file": "SVG Crafts"
    "shirt design": "SVG Crafts"
    "adhd": "Digital Planners"
    "planner": "Digital Planners"
    "notion": "Digital Planners"
