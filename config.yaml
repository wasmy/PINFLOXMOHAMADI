    "app": "Apps & Dashboards"
    "offline": "Apps & Dashboards"
    "dashboard": "Apps & Dashboards"
  keyword_product_map:
    "gymnastics mom": "https://www.etsy.com/listing/4505129993"
    "gym mom": "https://www.etsy.com/listing/4505129993"
    "sports mom": "https://www.etsy.com/listing/4513647574"
